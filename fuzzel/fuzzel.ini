[main]
font = JetBrainsMono:weight=bold:slant=italic
use-bold = yes
placeholder = Arch Linux
prompt = ">  "
message = "Notebook X552E"
message-mode = wrap
icon-theme = YAMIS
icons-enabled = yes
hide-before-typing = no
fields = filename,name,generic,exec,categories,keywords,comment
match-counter = yes
terminal = kitty {cmd}
list-executables-in-path = no
launch-prefix = "uwsm app --"
anchor = center
lines = 20
minimal-lines = yes
width = 30
tabs = 2
horizontal-pad = 40
vertical-pad = 4
inner-pad = 8
image-size-ratio = 1

[colors]
background = 00000099
text = ffffffaa
message = a31affff
prompt = 00ff00ff
placeholder = 00ff00ff
counter = a31affff
selection = 00000044
selection-text = ffffffff
